name: ci

# Full CI (typecheck + smoke) on a GitHub-hosted runner on every push/PR; deploy
# to Cloudflare ONLY on a pushed version tag (v*), NEVER on a bare push to main.
# An ordinary merge must not redeploy the live worlds. Cut a SemVer tag to ship:
# git tag -a v0.1.0 -m "..." && git push origin v0.1.0.
# Mirrors the former Jenkinsfile pipeline: typecheck -> smoke (two wrangler dev
# servers + smoke suite) -> wrangler deploy. This repo is PUBLIC, so a
# self-hosted runner would let fork PRs execute on a build box; GitHub-hosted is
# fork-safe and removes the single-runner SPOF. typecheck.yml stays as the
# always-on hosted typecheck path.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Supersede in-flight runs on the same ref so a new push cancels stale ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: 'true'
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi

      - uses: actions/setup-node@v7
        with:
          # Node 24 to match the former Jenkinsfile node:24 toolchain.
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke (both worlds + hub under wrangler dev)
        run: |
          # Clear per-world dev state so each CI run starts from a clean Grid.
          rm -rf .wrangler grid-hub/.wrangler worlds/.wrangler

          ADMIN_TOKEN="$(openssl rand -hex 16)"
          export ADMIN_TOKEN

          # Start hollow + hub (port 8787) and dustfall (port 8788) in background.
          # GHA job isolation is the process boundary: both servers die when the
          # job ends, the same guarantee the Jenkinsfile's docker wrapper gave.
          ./node_modules/.bin/wrangler dev -c wrangler.jsonc -c grid-hub/wrangler.jsonc \
            --var WORLD_URL:ws://localhost:8787/ws \
            --var "ADMIN_TOKEN:${ADMIN_TOKEN}" > dev-hollow.log 2>&1 &
          ./node_modules/.bin/wrangler dev -c worlds/dustfall.jsonc \
            --var WORLD_URL:ws://localhost:8788/ws \
            --var "ADMIN_TOKEN:${ADMIN_TOKEN}" > dev-dustfall.log 2>&1 &

          # Wait for dustfall (8788) -- once it answers, both are up (same logic
          # as ci-qa.sh, inlined to avoid the docker wrapper).
          node -e '
            const net = require("net");
            const up = () => new Promise((res) => {
              const s = net.connect(8788, "127.0.0.1");
              s.on("connect", () => { s.destroy(); res(true); });
              s.on("error", () => res(false));
            });
            (async () => {
              for (let i = 0; i < 120; i++) {
                if (await up()) process.exit(0);
                await new Promise(r => setTimeout(r, 1000));
              }
              console.error("dev servers did not come up in time");
              process.exit(1);
            })();
          '

          # Settle: let both worlds register with the hub before smoke hits them.
          sleep 5

          # Run the smoke suite. SMOKE_SLOW=2 matches the Jenkinsfile CI setting.
          SMOKE_SLOW=2 npm run smoke

      - name: Archive dev logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dev-logs
          path: |
            dev-hollow.log
            dev-dustfall.log
          if-no-files-found: ignore

  # DEPLOY GATE: runs ONLY for a pushed version tag (refs/tags/v*), after ci
  # passes. A push/merge to main runs `ci` above but never reaches here, so no
  # merge can redeploy the live worlds.
  deploy:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      # npm run deploy chains hub -> hollow -> dustfall in the correct order.
      - name: Deploy
        run: npm run deploy
