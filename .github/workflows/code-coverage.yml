name: Test and Native Code Coverage

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      
      code-quality: write    # Required for GitHub Enterprise Code Coverage API
      pull-requests: write   # Allows appending the widget inside the PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Start both worlds + hub (same shape as ci.yml / ci-qa.sh)
      - name: Start Local MUD Dev Servers
        run: |
          rm -rf .wrangler grid-hub/.wrangler worlds/.wrangler
          ./node_modules/.bin/wrangler dev -c wrangler.jsonc -c grid-hub/wrangler.jsonc \
            --var WORLD_URL:ws://localhost:8787/ws \
            --var ADMIN_TOKEN:ci-test-admin-token > dev-hollow.log 2>&1 &
          ./node_modules/.bin/wrangler dev -c worlds/dustfall.jsonc \
            --var WORLD_URL:ws://localhost:8788/ws \
            --var ADMIN_TOKEN:ci-test-admin-token > dev-dustfall.log 2>&1 &
          node -e '
            const net = require("net");
            const up = () => new Promise((res) => {
              const s = net.connect(8788, "127.0.0.1");
              s.on("connect", () => { s.destroy(); res(true); });
              s.on("error", () => res(false));
            });
            (async () => {
              for (let i = 0; i < 120; i++) {
                if (await up()) process.exit(0);
                await new Promise(r => setTimeout(r, 1000));
              }
              console.error("dev servers did not come up in time");
              process.exit(1);
            })();
          '
          sleep 5
        env:
          CI: "true"
          WRANGLER_SEND_METRICS: "false"

      # 2. Run instrumented smoke under CI pacing
      - name: Run Smoke Test with Coverage
        run: npx vitest run --coverage.enabled=true --coverage.provider=istanbul --coverage.reporter=cobertura --teardownTimeout=1
        env:
          SMOKE_SLOW: "2"
          ADMIN_TOKEN: ci-test-admin-token

      # 4. Upload the compiled metrics to GitHub's native Enterprise engine
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage/cobertura-coverage.xml
          language: javascript
